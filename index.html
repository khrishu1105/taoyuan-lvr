<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桃園實登查詢站 · 貝多房地產</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --navy:#0d2b45;--navy2:#123a5e;--blue:#1a6fb0;--blue-l:#e8f1f9;
    --ink:#1b2733;--sub:#6b7885;--line:#e4e9ef;--bg:#eef1f5;--card:#fff;
    --warn:#d0452b;--good:#1f9d57;
    --presale:#1a6fb0;--resale:#0f897c;--land:#b07f38;--bargain:#1f9d57;
    --shadow:0 1px 3px rgba(16,42,67,.06),0 1px 2px rgba(16,42,67,.04);
    --shadow-lg:0 8px 30px rgba(16,42,67,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1280px;margin:0 auto;padding:0 22px}
  a{color:var(--blue)}
  /* ---- splash ---- */
  #splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(150deg,var(--navy),var(--navy2));
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;transition:opacity .5s ease}
  #splash.hide{opacity:0;pointer-events:none}
  #splash .bars{display:flex;align-items:flex-end;gap:6px;height:56px}
  #splash .bars i{width:11px;background:#fff;border-radius:3px;animation:bar 1s ease-in-out infinite}
  #splash .bars i:nth-child(1){height:40%;animation-delay:0s}
  #splash .bars i:nth-child(2){height:65%;animation-delay:.15s}
  #splash .bars i:nth-child(3){height:90%;animation-delay:.3s}
  #splash .bars i:nth-child(4){height:55%;animation-delay:.45s}
  @keyframes bar{0%,100%{transform:scaleY(.5);opacity:.6}50%{transform:scaleY(1);opacity:1}}
  #splash h2{color:#fff;font-size:22px;font-weight:700;letter-spacing:2px}
  #splash p{color:#9fc0dc;font-size:13px;letter-spacing:1px}
  /* ---- app bar ---- */
  .appbar{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--line);box-shadow:var(--shadow)}
  .bar-inner{display:flex;align-items:center;gap:26px;min-height:62px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;padding:10px 0}
  .brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(150deg,var(--navy),var(--blue));
    display:flex;align-items:flex-end;justify-content:center;gap:2.5px;padding:8px 7px}
  .brand .logo i{width:4px;background:#fff;border-radius:1.5px;opacity:.95}
  .brand .logo i:nth-child(1){height:36%}.brand .logo i:nth-child(2){height:62%}.brand .logo i:nth-child(3){height:100%}
  .brand h1{font-size:18px;font-weight:800;letter-spacing:.5px;line-height:1.1}
  .brand .tag{display:block;font-size:10.5px;color:var(--sub);letter-spacing:1.5px;font-weight:500}
  .tabs{display:flex;gap:2px;margin-left:auto;flex-wrap:wrap}
  .tab{padding:9px 16px;font-size:14px;font-weight:600;color:var(--sub);cursor:pointer;border-radius:8px;
    display:flex;align-items:center;gap:7px;transition:.15s;border:1px solid transparent}
  .tab:hover{background:var(--bg);color:var(--ink)}
  .tab.on{background:var(--accent,var(--blue));color:#fff}
  .tab.on .n{color:rgba(255,255,255,.75)}
  .tab .n{font-size:11px;font-weight:500;color:#a9b4bf}
  /* ---- subbar ---- */
  .subbar{background:var(--card);border-bottom:1px solid var(--line)}
  .sub{font-size:12.5px;color:var(--sub);padding:9px 0}
  .sub b{color:var(--blue);font-weight:700}
  main{padding-bottom:40px}
  /* ---- stat cards ---- */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;padding:22px 0 18px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 17px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--blue))}
  .stat .k{font-size:11.5px;color:var(--sub);letter-spacing:.5px}
  .stat .v{font-size:23px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:3px;color:var(--navy)}
  .stat .v small{font-size:12px;font-weight:500;color:var(--sub)}
  /* ---- filters ---- */
  .filters{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;background:var(--card);
    border:1px solid var(--line);border-radius:12px;padding:15px 16px;margin-bottom:16px;box-shadow:var(--shadow)}
  .filters label{font-size:11.5px;color:var(--sub);display:flex;flex-direction:column;gap:5px;font-weight:600}
  .filters select,.filters input{font:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--line);
    border-radius:8px;background:#fbfcfd;color:var(--ink);transition:.15s;font-weight:400}
  .filters select:focus,.filters input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l);background:#fff}
  .filters input[type=text]{min-width:210px}
  .chk{flex-direction:row!important;align-items:center;gap:6px;height:35px;font-weight:500;color:var(--ink)}
  .count{margin-left:auto;font-size:12.5px;color:var(--sub);font-weight:600;align-self:center}
  /* ---- table ---- */
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
  thead th{background:#f6f8fa;font-size:11.5px;letter-spacing:.3px;color:#5a6a78;text-align:right;font-weight:700;
    padding:12px 13px;border-bottom:2px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:62px}
  thead th.l{text-align:left}
  thead th:hover{background:#eef2f6;color:var(--blue)}
  thead th small{font-weight:500;color:#9aa7b3}
  tbody td{padding:11px 13px;border-bottom:1px solid #eef2f5;font-size:13px;text-align:right;font-variant-numeric:tabular-nums}
  tbody td.l{text-align:left}
  tbody tr:last-child td{border-bottom:none}
  tbody tr.prow{cursor:pointer}
  tbody tr:hover{background:#f7fafc}
  .pname{font-weight:700;color:var(--navy)}
  .dist{display:inline-block;font-size:10.5px;color:var(--blue);background:var(--blue-l);border-radius:5px;padding:1.5px 7px;margin-right:6px;font-weight:600}
  .term{color:var(--warn);font-weight:700}.muted{color:#c2cad2}.price{font-weight:700;color:var(--navy)}
  .rng{font-size:11.5px;color:var(--sub)}
  tr.detail td{background:#f7fafc;padding:0}
  .dwrap{padding:8px 16px 16px 40px}
  .dwrap h4{font-size:12.5px;color:var(--navy);margin:10px 0 7px;font-weight:700}
  table.tx{border:1px solid var(--line);box-shadow:none}
  table.tx th{background:#eef2f6;font-size:11px;padding:7px 10px;position:static}
  table.tx td{padding:6px 10px;font-size:12px}
  .badge-term{background:#fbe4de;color:var(--warn);font-size:10px;border-radius:4px;padding:1px 6px;font-weight:600}
  .loading{text-align:center;padding:60px 20px;color:var(--sub);font-size:14px}
  .pager{display:flex;gap:10px;align-items:center;justify-content:center;padding:18px;font-size:13px}
  .pager button{font:inherit;padding:7px 14px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-weight:600;color:var(--navy)}
  .pager button:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}
  .pager button:disabled{opacity:.4;cursor:default}
  footer{color:var(--sub);font-size:11.5px;padding:24px 0 44px;line-height:1.75}
  footer b{color:var(--ink)}
  #map{height:560px;border-radius:12px;border:1px solid var(--line);box-shadow:var(--shadow);z-index:1}
  .maplegend{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--sub);margin:12px 0 4px}
  .maplegend .bar{height:12px;width:180px;border-radius:6px;background:linear-gradient(90deg,#2e9e5b,#e0a52b,#d0452b)}
  .leaflet-popup-content{font-family:inherit;font-size:13px}
  .leaflet-popup-content b{color:var(--navy)}
  .maptip{background:transparent!important;border:none!important;box-shadow:none!important;color:#fff;
    font-weight:700;font-size:11px;text-shadow:0 1px 3px rgba(0,0,0,.7);padding:0}
  .maptip::before{display:none!important}
  @media(max-width:860px){.stats{grid-template-columns:repeat(2,1fr)}.hidem{display:none}
    .bar-inner{min-height:auto;padding:8px 0}.tabs{margin-left:0;width:100%}.tab{flex:1;justify-content:center;padding:8px 8px}
    thead th{position:static}}
</style>
</head>
<body>
<div id="splash">
  <div class="bars"><i></i><i></i><i></i><i></i></div>
  <h2>桃園實登查詢站</h2>
  <p>載入實價登錄資料中…</p>
</div>

<header class="appbar"><div class="wrap bar-inner">
  <div class="brand">
    <div class="logo"><i></i><i></i><i></i></div>
    <div><h1>桃園實登查詢站</h1><span class="tag">貝多房地產 · 實價登錄分析</span></div>
  </div>
  <div class="tabs" id="tabs"></div>
</div></header>
<div class="subbar"><div class="wrap"><div class="sub" id="sub">載入中…</div></div></div>

<main class="wrap">
  <div class="stats" id="stats"></div>
  <div class="filters" id="filters"></div>
  <div id="tablewrap"></div>
  <footer id="foot"></footer>
</main>

<script>
let META=null;
const CACHE={};            // 各品項資料快取
let TAB="presale";
const state={presale:{},resale:{},land:{}};

const EMBED = window.__EMBED__ || null;   // 單機版會有；伺服器版走 fetch
async function load(name){
  if(CACHE[name]) return CACHE[name];
  if(EMBED && EMBED[name]){ CACHE[name]=EMBED[name]; return CACHE[name]; }
  const r=await fetch("data/"+name+".json"); const j=await r.json(); CACHE[name]=j; return j;
}

const TABS=[
  {id:"presale",label:"預售屋",color:"var(--presale)"},
  {id:"resale", label:"中古/成屋",color:"var(--resale)"},
  {id:"land",   label:"土地",color:"var(--land)"},
  {id:"bargain",label:"檢便宜",color:"var(--good)"},
  {id:"map",    label:"地圖",color:"var(--navy)"},
];

const SOURCE = `資料源：<b>內政部不動產成交案件實際資訊</b>（實價登錄開放資料·每旬更新）· 桃園市`;
function rangeText(t){
  const r={presale:[META.presale_min,META.presale_max],resale:[META.resale_min,META.resale_max],land:[META.land_min,META.land_max]}[t];
  return r&&r[0]?`本頁資料涵蓋 <b>${r[0]} ～ ${r[1]}</b>`:"";
}
function setSub(t){document.getElementById("sub").innerHTML = SOURCE + " · " + rangeText(t);}
async function boot(){
  META = await load("meta");
  setSub("presale");
  document.getElementById("tabs").innerHTML = TABS.map(t=>
    `<div class="tab" data-t="${t.id}" style="--accent:${t.color}">${t.label}<span class="n" id="n_${t.id}"></span></div>`).join("");
  document.getElementById("n_presale").textContent = META.presale_projects+" 案";
  document.getElementById("n_resale").textContent = (META.resale_tx/1000).toFixed(0)+"k 筆";
  document.getElementById("n_land").textContent = (META.land_tx/1000).toFixed(0)+"k 筆";
  document.getElementById("n_bargain").textContent = (META.resale_bargains||0)+" 筆";
  document.querySelectorAll(".tab").forEach(el=>el.addEventListener("click",()=>switchTab(el.dataset.t)));
  document.getElementById("foot").innerHTML =
    `<b>近3年中位</b>：因近年房市漲幅大，全期均價會被早年低價拉低，故另計近3年(${META.recent_cut||''}起)中位單價較貼近現況，地圖顏色亦採近3年。`+
    `口徑：單價採<b>去車位單價</b>＝(總價−車位價)/(建物−車位面積)換算萬/坪，避免車位灌入拉低。行情統計與檢便宜<b>只採住宅、排除特殊交易</b>(親友/持分/含增建/含稅費等，來自官方備註)；店面/辦公/工業歸「非住宅」、格局多為0房，可用篩選開關切換。預售「有效筆數＝總筆－解約」。`+
    `筆數≠戶數(含車位分列、簽約時間差；預售2021/7前為舊制)。<b>中古的「社區/建案名」是用地號比對我方預售資料自動推得</b>(內政部中古開放資料本身無社區名)，只標對得到的、無把握就留空；預售分頁「中古轉售」=該建案<b>確認二次轉售</b>筆數(同一門牌在成屋檔出現≥2次的超出部分)；剛交屋建案的成屋紀錄多為建商成屋/交屋首購=第一手，不算轉售，故此數通常遠小於戶數。`+
    `<br>本工具為靜態頁，資料源內政部政府開放資料(可重製散布，須標示來源)，非官方系統。更新：重跑 etl.py。 · 製作 khrishu`;
  switchTab("presale");
  const sp=document.getElementById("splash"); if(sp) setTimeout(()=>sp.classList.add("hide"),350);
}

function switchTab(t){
  TAB=t;
  document.querySelectorAll(".tab").forEach(el=>el.classList.toggle("on",el.dataset.t===t));
  setSub(t);
  ({presale:renderPresale,resale:renderResale,land:renderLand,bargain:renderBargains,map:renderMap})[t]();
}

function distOptions(){return `<option value="">全部</option>`+META.districts.map(d=>`<option>${d}</option>`).join("");}
function fmt(v,dp=1){return v==null?'<span class="muted">—</span>':Number(v).toLocaleString(undefined,{minimumFractionDigits:dp,maximumFractionDigits:dp});}
function statCards(cards){document.getElementById("stats").innerHTML=cards.map(c=>`<div class="stat"><div class="k">${c[0]}</div><div class="v">${c[1]} <small>${c[2]||''}</small></div></div>`).join("");}
function shortAddr(d,a){a=a||"";const p="桃園市"+d;return a.startsWith(p)?a.slice(p.length):a.replace("桃園市","");}

/* ================= 預售屋（建案聚合 + drill） ================= */
async function renderPresale(){
  document.getElementById("tablewrap").innerHTML=`<div class="loading">載入預售屋資料…</div>`;
  const P=await load("presale_projects"); const s=state.presale;
  statCards([["預售逐筆",META.presale_tx.toLocaleString()],["建案數",META.presale_projects.toLocaleString(),"個"],
    ["解約筆數",META.presale_term.toLocaleString(),`(${(META.presale_term/META.presale_tx*100).toFixed(1)}%)`],
    ["季別",META.seasons.length,"季"],["行政區",META.districts.length,"區"]]);
  document.getElementById("filters").innerHTML=`
    <label>行政區<select id="fD">${distOptions()}</select></label>
    <label>建案/門牌關鍵字<input type="text" id="fQ" placeholder="站前、A22、水公園"></label>
    <label>最少有效筆數<input type="number" id="fMin" value="0" min="0" style="width:80px"></label>
    <label class="chk"><input type="checkbox" id="fTerm"> 只看有解約</label>
    <label>排序<select id="fS"><option value="valid">有效筆數↓</option><option value="med3">近3年中位↓</option><option value="avg">全期均價↓</option><option value="avgtot">均總價↓</option><option value="p2">最新登錄↓</option></select></label>
    <span class="count" id="cnt"></span>`;
  const draw=()=>{
    const d=fD.value,q=fQ.value.trim(),mn=+fMin.value||0,ot=fTerm.checked,sk=fS.value;
    let list=P.filter(p=>(!d||p.d===d)&&(!mn||p.valid>=mn)&&(!ot||p.term)&&(!q||(p.n+p.d).includes(q)));
    list.sort((a,b)=>{let x=a[sk],y=b[sk];if(sk==="p2")return (y||"").localeCompare(x||"");return (y??-1)-(x??-1);});
    cnt.textContent=`符合 ${list.length} 案 / 共 ${P.length}`;
    document.getElementById("tablewrap").innerHTML=`<table><thead><tr>
      <th class="l">建案 / 行政區</th><th>有效/總</th><th class="hidem">解約</th><th>全期<br><small>均價</small></th>
      <th>近3年<br><small>中位</small></th><th class="hidem">單價區間</th><th>均總價<br><small>萬</small></th><th class="hidem">主力房</th><th>中古<br><small>轉售</small></th><th class="l">登錄期間</th>
      </tr></thead><tbody>${list.slice(0,400).map(pRow).join("")||empty(10)}</tbody></table>`;
    document.querySelectorAll("tr.prow").forEach(tr=>tr.addEventListener("click",()=>drillPresale(tr)));
  };
  ["fD","fQ","fMin","fTerm","fS"].forEach(id=>document.getElementById(id).addEventListener("input",draw));
  draw();
}
function pRow(p){return `<tr class="prow" data-k="${encodeURIComponent(p.d+"|"+p.n)}">
  <td class="l"><span class="dist">${p.d}</span><span class="pname">${p.n}</span></td>
  <td>${p.valid}<small style="color:#bbb">/${p.cnt}</small></td>
  <td class="hidem">${p.term?`<span class="term">${p.term}</span>`:'<span class="muted">0</span>'}</td>
  <td class="price">${fmt(p.avg)}</td>
  <td class="price" style="color:var(--presale)">${p.med3!=null?fmt(p.med3):'<span class="muted">—</span>'}</td>
  <td class="hidem">${p.lo!=null?`<span class="rng">${fmt(p.lo)}–${fmt(p.hi)}</span>`:'<span class="muted">—</span>'}</td>
  <td>${p.avgtot?p.avgtot.toLocaleString():'<span class="muted">—</span>'}</td>
  <td class="hidem">${p.room?p.room+'房':'<span class="muted">—</span>'}</td>
  <td>${p.resale?`<span class="term" style="color:var(--resale)">${p.resale}</span>`:'<span class="muted">0</span>'}</td>
  <td class="l"><span class="rng">${p.p1||''} ~ ${p.p2||''}</span></td></tr>`;}
async function drillPresale(tr){
  const nx=tr.nextElementSibling; if(nx&&nx.classList.contains("detail")){nx.remove();return;}
  const [d,n]=decodeURIComponent(tr.dataset.k).split("|");
  const TX=await load("presale_tx");
  const rows=TX.filter(r=>r[0]===d&&r[1]===n).sort((a,b)=>(b[3]||"").localeCompare(a[3]||""));
  const body=rows.map(r=>`<tr><td>${r[3]||''}</td><td style="text-align:left">${r[2]||''}</td>
    <td>${r[4]}房${r[5]}廳${r[6]}衛</td><td>${r[7]||''}/${r[8]||''}</td>
    <td style="text-align:right">${r[9]!=null?r[9].toFixed(1):'—'}</td><td style="text-align:right">${r[10]!=null?r[10].toLocaleString():'—'}</td>
    <td>${r[11]||''} ${r[12]?'<span class="badge-term">解約</span>':''}</td></tr>`).join("");
  insertDetail(tr,9,`逐筆成交（${rows.length} 筆）`,
    `<thead><tr><th>交易日</th><th style="text-align:left">門牌</th><th>格局</th><th>樓/總</th><th style="text-align:right">單價萬/坪</th><th style="text-align:right">總價萬</th><th>車位/狀態</th></tr></thead><tbody>${body}</tbody>`);
}

/* ================= 中古/成屋（逐筆分頁 + 區×型態統計） ================= */
function liteNotice(){document.getElementById("filters").innerHTML="";document.getElementById("stats").innerHTML="";
  document.getElementById("tablewrap").innerHTML=`<div class="loading">此為單機精簡版，僅內建預售屋完整資料。<br>中古/土地逐筆明細請用「完整站」（資料夾＋開啟查詢頁.command）。</div>`;}
async function renderResale(){
  if(EMBED && !EMBED.resale_tx){liteNotice();return;}
  document.getElementById("tablewrap").innerHTML=`<div class="loading">載入中古屋 ${(META.resale_tx/1000).toFixed(0)}k 筆…（首次較久）</div>`;
  const [TX,AREA,BLDG]=await Promise.all([load("resale_tx"),load("resale_area"),load("resale_bldg")]);
  const s=state.resale; s.page=s.page||0; s.mode=s.mode||"list";
  const btypes=[...new Set(AREA.map(a=>a.bt))];
  statCards([["中古逐筆",META.resale_tx.toLocaleString()],["確認二次轉售",(META.resale_resold||0).toLocaleString(),"筆"],
    ["已對到建案名",META.resale_named.toLocaleString(),`(${(META.resale_named/META.resale_tx*100).toFixed(0)}%)`],

    const rows=entries.slice().sort((a,b)=>pv(b[2])-pv(a[2]));
    document.getElementById("maplist").innerHTML=`<table><thead><tr>
      <th class="l">${nameCol}</th><th>成交量</th><th>近3年<br><small>中位</small></th><th class="hidem">全期<br><small>中位</small></th><th>平均總價<br><small>萬</small></th>
      </tr></thead><tbody>${rows.map(([nm,ll,v])=>`<tr><td class="l"><span class="dist">${nm}</span></td>
      <td>${v.n.toLocaleString()}</td><td class="price">${v.med3!=null?v.med3:'—'}</td><td class="hidem">${v.med}</td><td>${v.avgtot?v.avgtot.toLocaleString():'—'}</td></tr>`).join("")}</tbody></table>`;
  };
  fLv.addEventListener("change",()=>{setMk();draw();});
  fMk.addEventListener("change",draw);
  draw();
  setTimeout(()=>LMAP.invalidateSize(),200);
}

/* ===== 共用 ===== */
function empty(c){return `<tr><td colspan="${c}" style="text-align:center;padding:30px;color:#999">查無符合條件的資料</td></tr>`;}
function insertDetail(tr,span,title,inner){
  const det=document.createElement("tr");det.className="detail";
  det.innerHTML=`<td colspan="${span}"><div class="dwrap"><h4>${title}</h4><table class="tx">${inner}</table></div></td>`;
  tr.after(det);
}
boot().catch(e=>{const sp=document.getElementById("splash");if(sp)sp.classList.add("hide");
  document.getElementById("sub").textContent="⚠ 資料載入失敗，請用本機伺服器開啟(見頁尾)。"+e;});
</script>
