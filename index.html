<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桃園實登查詢站 · 貝多房地產</title>
<style>
  :root{--ink:#1a1a1a;--sub:#6b6b6b;--line:#e5e2dc;--bg:#f6f4ef;--card:#fff;
    --accent:#8a6d3b;--warn:#b4462f;--good:#3f6b4a;--presale:#8a6d3b;--resale:#2f6b7a;--land:#6b5b3f;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1240px;margin:0 auto;padding:0 20px}
  header{border-bottom:1px solid var(--line);background:var(--card)}
  .brand{display:flex;align-items:baseline;gap:14px;padding:22px 0 6px}
  .brand h1{font-family:"Songti TC","Noto Serif TC",serif;font-weight:600;font-size:26px;letter-spacing:1px}
  .brand .tag{font-size:12px;color:var(--sub);letter-spacing:3px}
  .sub{font-size:12.5px;color:var(--sub);padding-bottom:14px}
  .sub b{color:var(--accent)}
  /* tabs */
  .tabs{display:flex;gap:4px;padding-bottom:0}
  .tab{padding:10px 22px;font-size:14px;font-weight:600;color:var(--sub);cursor:pointer;
    border:1px solid transparent;border-bottom:none;border-radius:9px 9px 0 0;position:relative;top:1px}
  .tab.on{background:var(--bg);color:var(--ink);border-color:var(--line)}
  .tab .n{font-size:11px;font-weight:400;color:#aaa;margin-left:5px}
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:20px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:13px 15px}
  .stat .k{font-size:11px;color:var(--sub);letter-spacing:1px}
  .stat .v{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}
  .stat .v small{font-size:12px;font-weight:400;color:var(--sub)}
  .filters{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;background:var(--card);
    border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:16px}
  .filters label{font-size:12px;color:var(--sub);display:flex;flex-direction:column;gap:4px}
  .filters select,.filters input{font:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink)}
  .filters input[type=text]{min-width:200px}
  .chk{flex-direction:row!important;align-items:center;gap:6px;height:33px}
  .count{margin-left:auto;font-size:12px;color:var(--sub)}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  thead th{background:#efece5;font-size:11.5px;letter-spacing:.5px;color:#4a4a4a;text-align:right;
    padding:11px 12px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap}
  thead th.l{text-align:left}
  thead th:hover{background:#e7e3da}
  tbody td{padding:10px 12px;border-bottom:1px solid #f0eee9;font-size:13px;text-align:right;font-variant-numeric:tabular-nums}
  tbody td.l{text-align:left}
  tbody tr.prow{cursor:pointer}
  tbody tr.prow:hover{background:#faf8f3}
  .pname{font-weight:600}
  .dist{display:inline-block;font-size:11px;color:var(--sub);background:#f0eee8;border-radius:5px;padding:1px 7px;margin-right:6px}
  .term{color:var(--warn);font-weight:600}.muted{color:#bbb}.price{font-weight:700}
  .rng{font-size:11.5px;color:var(--sub)}
  tr.detail td{background:#faf9f5;padding:0}
  .dwrap{padding:6px 14px 14px 40px}
  .dwrap h4{font-size:12px;color:var(--sub);margin:8px 0 6px;font-weight:600}
  table.tx{border:1px solid var(--line)}
  table.tx th{background:#f4f2ec;font-size:11px;padding:7px 10px}
  table.tx td{padding:6px 10px;font-size:12px}
  .badge-term{background:#f7e6e2;color:var(--warn);font-size:10px;border-radius:4px;padding:1px 5px}
  .loading{text-align:center;padding:50px;color:var(--sub);font-size:14px}
  .pager{display:flex;gap:8px;align-items:center;justify-content:center;padding:16px;font-size:13px}
  .pager button{font:inherit;padding:6px 12px;border:1px solid var(--line);border-radius:7px;background:#fff;cursor:pointer}
  .pager button:disabled{opacity:.4;cursor:default}
  footer{color:var(--sub);font-size:11.5px;padding:26px 0 40px;line-height:1.7}
  @media(max-width:820px){.stats{grid-template-columns:repeat(2,1fr)}.hidem{display:none}}
</style>
</head>
<body>
<header><div class="wrap">
  <div class="brand"><h1>桃園實登查詢站</h1><span class="tag">貝多房地產 · 內部工具</span></div>
  <div class="sub" id="sub">載入中…</div>
  <div class="tabs" id="tabs"></div>
</div></header>

<div class="wrap">
  <div class="stats" id="stats"></div>
  <div class="filters" id="filters"></div>
  <div id="tablewrap"></div>
  <footer id="foot"></footer>
</div>

<script>
let META=null;
const CACHE={};            // 各品項資料快取
let TAB="presale";
const state={presale:{},resale:{},land:{}};

const EMBED = window.__EMBED__ || null;   // 單機版會有；伺服器版走 fetch
async function load(name){
  if(CACHE[name]) return CACHE[name];
  if(EMBED && EMBED[name]){ CACHE[name]=EMBED[name]; return CACHE[name]; }
  const r=await fetch("data/"+name+".json"); const j=await r.json(); CACHE[name]=j; return j;
}

const TABS=[
  {id:"presale",label:"預售屋",color:"var(--presale)"},
  {id:"resale", label:"中古/成屋",color:"var(--resale)"},
  {id:"land",   label:"土地",color:"var(--land)"},
];

const SOURCE = `資料源：<b>內政部不動產成交案件實際資訊</b>（實價登錄開放資料·每旬更新）· 桃園市`;
function rangeText(t){
  const r={presale:[META.presale_min,META.presale_max],resale:[META.resale_min,META.resale_max],land:[META.land_min,META.land_max]}[t];
  return r&&r[0]?`本頁資料涵蓋 <b>${r[0]} ～ ${r[1]}</b>`:"";
}
function setSub(t){document.getElementById("sub").innerHTML = SOURCE + " · " + rangeText(t);}
async function boot(){
  META = await load("meta");
  setSub("presale");
  document.getElementById("tabs").innerHTML = TABS.map(t=>
    `<div class="tab" data-t="${t.id}" style="--accent:${t.color}">${t.label}<span class="n" id="n_${t.id}"></span></div>`).join("");
  document.getElementById("n_presale").textContent = META.presale_projects+" 案";
  document.getElementById("n_resale").textContent = (META.resale_tx/1000).toFixed(0)+"k 筆";
  document.getElementById("n_land").textContent = (META.land_tx/1000).toFixed(0)+"k 筆";
  document.querySelectorAll(".tab").forEach(el=>el.addEventListener("click",()=>switchTab(el.dataset.t)));
  document.getElementById("foot").innerHTML =
    `口徑：單價＝內政部「單價元/平方公尺」換算萬/坪(×3.305785)。預售「有效筆數＝總筆－解約」(多數比價站不拆)。`+
    `筆數≠戶數(含車位分列、簽約時間差；預售2021/7前為舊制)。中古依「區×型態」統計、土地依「區×使用分區」。`+
    `<br>本工具為靜態頁，資料源內政部政府開放資料(可重製散布，須標示來源)，非官方系統。更新：重跑 etl.py。 · 製作 khrishu`;
  switchTab("presale");
}

function switchTab(t){
  TAB=t;
  document.querySelectorAll(".tab").forEach(el=>el.classList.toggle("on",el.dataset.t===t));
  setSub(t);
  ({presale:renderPresale,resale:renderResale,land:renderLand})[t]();
}

function distOptions(){return `<option value="">全部</option>`+META.districts.map(d=>`<option>${d}</option>`).join("");}
function fmt(v,dp=1){return v==null?'<span class="muted">—</span>':Number(v).toLocaleString(undefined,{minimumFractionDigits:dp,maximumFractionDigits:dp});}
function statCards(cards){document.getElementById("stats").innerHTML=cards.map(c=>`<div class="stat"><div class="k">${c[0]}</div><div class="v">${c[1]} <small>${c[2]||''}</small></div></div>`).join("");}

/* ================= 預售屋（建案聚合 + drill） ================= */
async function renderPresale(){
  document.getElementById("tablewrap").innerHTML=`<div class="loading">載入預售屋資料…</div>`;
  const P=await load("presale_projects"); const s=state.presale;
  statCards([["預售逐筆",META.presale_tx.toLocaleString()],["建案數",META.presale_projects.toLocaleString(),"個"],
    ["解約筆數",META.presale_term.toLocaleString(),`(${(META.presale_term/META.presale_tx*100).toFixed(1)}%)`],
    ["季別",META.seasons.length,"季"],["行政區",META.districts.length,"區"]]);
  document.getElementById("filters").innerHTML=`
    <label>行政區<select id="fD">${distOptions()}</select></label>
    <label>建案/門牌關鍵字<input type="text" id="fQ" placeholder="站前、A22、水公園"></label>
    <label>最少有效筆數<input type="number" id="fMin" value="0" min="0" style="width:80px"></label>
    <label class="chk"><input type="checkbox" id="fTerm"> 只看有解約</label>
    <label>排序<select id="fS"><option value="valid">有效筆數↓</option><option value="avg">均價↓</option><option value="avgtot">均總價↓</option><option value="p2">最新登錄↓</option></select></label>
    <span class="count" id="cnt"></span>`;
  const draw=()=>{
    const d=fD.value,q=fQ.value.trim(),mn=+fMin.value||0,ot=fTerm.checked,sk=fS.value;
    let list=P.filter(p=>(!d||p.d===d)&&(!mn||p.valid>=mn)&&(!ot||p.term)&&(!q||(p.n+p.d).includes(q)));
    list.sort((a,b)=>{let x=a[sk],y=b[sk];if(sk==="p2")return (y||"").localeCompare(x||"");return (y??-1)-(x??-1);});
    cnt.textContent=`符合 ${list.length} 案 / 共 ${P.length}`;
    document.getElementById("tablewrap").innerHTML=`<table><thead><tr>
      <th class="l">建案 / 行政區</th><th>有效/總</th><th class="hidem">解約</th><th>均價<br><small>萬/坪</small></th>
      <th class="hidem">中位</th><th>單價區間</th><th>均總價<br><small>萬</small></th><th class="hidem">主力房</th><th class="l">登錄期間</th>
      </tr></thead><tbody>${list.slice(0,400).map(pRow).join("")||empty(9)}</tbody></table>`;
    document.querySelectorAll("tr.prow").forEach(tr=>tr.addEventListener("click",()=>drillPresale(tr)));
  };
  ["fD","fQ","fMin","fTerm","fS"].forEach(id=>document.getElementById(id).addEventListener("input",draw));
  draw();
}
function pRow(p){return `<tr class="prow" data-k="${encodeURIComponent(p.d+"|"+p.n)}">
  <td class="l"><span class="dist">${p.d}</span><span class="pname">${p.n}</span></td>
  <td>${p.valid}<small style="color:#bbb">/${p.cnt}</small></td>
  <td class="hidem">${p.term?`<span class="term">${p.term}</span>`:'<span class="muted">0</span>'}</td>
  <td class="price">${fmt(p.avg)}</td><td class="hidem">${fmt(p.med)}</td>
  <td>${p.lo!=null?`<span class="rng">${fmt(p.lo)}–${fmt(p.hi)}</span>`:'<span class="muted">—</span>'}</td>
  <td>${p.avgtot?p.avgtot.toLocaleString():'<span class="muted">—</span>'}</td>
  <td class="hidem">${p.room?p.room+'房':'<span class="muted">—</span>'}</td>
  <td class="l"><span class="rng">${p.p1||''} ~ ${p.p2||''}</span></td></tr>`;}
async function drillPresale(tr){
  const nx=tr.nextElementSibling; if(nx&&nx.classList.contains("detail")){nx.remove();return;}
  const [d,n]=decodeURIComponent(tr.dataset.k).split("|");
  const TX=await load("presale_tx");
  const rows=TX.filter(r=>r[0]===d&&r[1]===n).sort((a,b)=>(b[3]||"").localeCompare(a[3]||""));
  const body=rows.map(r=>`<tr><td>${r[3]||''}</td><td style="text-align:left">${r[2]||''}</td>
    <td>${r[4]}房${r[5]}廳${r[6]}衛</td><td>${r[7]||''}/${r[8]||''}</td>
    <td style="text-align:right">${r[9]!=null?r[9].toFixed(1):'—'}</td><td style="text-align:right">${r[10]!=null?r[10].toLocaleString():'—'}</td>
    <td>${r[11]||''} ${r[12]?'<span class="badge-term">解約</span>':''}</td></tr>`).join("");
  insertDetail(tr,9,`逐筆成交（${rows.length} 筆）`,
    `<thead><tr><th>交易日</th><th style="text-align:left">門牌</th><th>格局</th><th>樓/總</th><th style="text-align:right">單價萬/坪</th><th style="text-align:right">總價萬</th><th>車位/狀態</th></tr></thead><tbody>${body}</tbody>`);
}

/* ================= 中古/成屋（逐筆分頁 + 區×型態統計） ================= */
function liteNotice(){document.getElementById("filters").innerHTML="";document.getElementById("stats").innerHTML="";
  document.getElementById("tablewrap").innerHTML=`<div class="loading">此為單機精簡版，僅內建預售屋完整資料。<br>中古/土地逐筆明細請用「完整站」（資料夾＋開啟查詢頁.command）。</div>`;}
async function renderResale(){
  if(EMBED && !EMBED.resale_tx){liteNotice();return;}
  document.getElementById("tablewrap").innerHTML=`<div class="loading">載入中古屋 ${(META.resale_tx/1000).toFixed(0)}k 筆…（首次較久）</div>`;
  const [TX,AREA]=await Promise.all([load("resale_tx"),load("resale_area")]);
  const s=state.resale; s.page=s.page||0;
  const btypes=[...new Set(AREA.map(a=>a.bt))];
  statCards([["中古逐筆",META.resale_tx.toLocaleString()],["行政區",META.districts.length,"區"],
    ["建物型態",btypes.length,"種"],["季別",META.seasons.length,"季"],["涵蓋",META.resale_min.slice(0,7),`~${META.resale_max.slice(0,7)}`]]);
  document.getElementById("filters").innerHTML=`
    <label>行政區<select id="fD">${distOptions()}</select></label>
    <label>建物型態<select id="fB"><option value="">全部</option>${btypes.map(b=>`<option>${b}</option>`).join("")}</select></label>
    <label>門牌/路段關鍵字<input type="text" id="fQ" placeholder="中華路、青埔、實踐"></label>
    <label>屋齡上限<input type="number" id="fAge" placeholder="不限" style="width:80px"></label>
    <label>排序<select id="fS"><option value="date">交易日↓</option><option value="unit">單價↓</option><option value="total">總價↓</option></select></label>
    <span class="count" id="cnt"></span>`;
  const draw=()=>{
    const d=fD.value,b=fB.value,q=fQ.value.trim(),ag=+fAge.value||0,sk=fS.value;
    let list=TX.filter(r=>(!d||r[0]===d)&&(!b||r[3]===b)&&(!q||(r[1]||"").includes(q))&&(!ag||(r[4]!=null&&r[4]<=ag)));
    const idx={date:2,unit:10,total:11}[sk];
    list.sort((a,b2)=>{if(sk==="date")return (b2[2]||"").localeCompare(a[2]||"");return (b2[idx]??-1)-(a[idx]??-1);});
    s.list=list; s.page=Math.min(s.page,Math.floor((list.length-1)/50)||0);
    cnt.textContent=`符合 ${list.length.toLocaleString()} 筆`;
    drawPage();
  };
  const drawPage=()=>{
    const per=50,list=s.list,pg=s.page,slice=list.slice(pg*per,pg*per+per);
    document.getElementById("tablewrap").innerHTML=`<table><thead><tr>
      <th class="l">門牌 / 行政區</th><th class="hidem">型態</th><th>屋齡</th><th>格局</th><th class="hidem">樓/總</th>
      <th>單價<br><small>萬/坪</small></th><th>總價<br><small>萬</small></th><th class="l">交易日</th>
      </tr></thead><tbody>${slice.map(rRow).join("")||empty(8)}</tbody></table>
      <div class="pager">
        <button id="pp" ${pg<=0?'disabled':''}>‹ 上一頁</button>
        <span>第 ${pg+1} / ${Math.max(1,Math.ceil(list.length/per))} 頁</span>
        <button id="pn" ${(pg+1)*per>=list.length?'disabled':''}>下一頁 ›</button></div>`;
    const pp=document.getElementById("pp"),pn=document.getElementById("pn");
    if(pp)pp.onclick=()=>{s.page--;drawPage();window.scrollTo(0,0);};
    if(pn)pn.onclick=()=>{s.page++;drawPage();window.scrollTo(0,0);};
  };
  ["fD","fB","fQ","fAge","fS"].forEach(id=>document.getElementById(id).addEventListener("input",()=>{s.page=0;draw();}));
  draw();
}
function rRow(r){return `<tr>
  <td class="l"><span class="dist">${r[0]}</span>${r[1]||''}</td>
  <td class="hidem">${r[3]||''}</td><td>${r[4]!=null?r[4]+'年':'<span class="muted">—</span>'}</td>
  <td>${r[5]}房${r[6]}廳${r[7]}衛</td><td class="hidem">${r[8]||''}/${r[9]||''}</td>
  <td class="price">${r[10]!=null?r[10].toFixed(1):'<span class="muted">—</span>'}</td>
  <td>${r[11]!=null?r[11].toLocaleString():'<span class="muted">—</span>'}</td>
  <td class="l"><span class="rng">${r[2]||''}</span></td></tr>`;}

/* ================= 土地（逐筆分頁 + 區×分區統計） ================= */
async function renderLand(){
  if(EMBED && !EMBED.land_tx){liteNotice();return;}
  document.getElementById("tablewrap").innerHTML=`<div class="loading">載入土地資料…</div>`;
  const [TX,AREA]=await Promise.all([load("land_tx"),load("land_area")]);
  const s=state.land; s.page=s.page||0;
  const zones=[...new Set(AREA.map(a=>a.zone))];
  statCards([["土地逐筆",META.land_tx.toLocaleString()],["行政區",META.districts.length,"區"],
    ["使用分區",zones.length,"種"],["季別",META.seasons.length,"季"],["涵蓋",META.land_min.slice(0,7),`~${META.land_max.slice(0,7)}`]]);
  document.getElementById("filters").innerHTML=`
    <label>行政區<select id="fD">${distOptions()}</select></label>
    <label>使用分區<select id="fZ"><option value="">全部</option>${zones.map(z=>`<option>${z}</option>`).join("")}</select></label>
    <label>位置關鍵字<input type="text" id="fQ" placeholder="段、路名"></label>
    <label>排序<select id="fS"><option value="date">交易日↓</option><option value="unit">單價↓</option><option value="total">總價↓</option><option value="area">面積↓</option></select></label>
    <span class="count" id="cnt"></span>`;
  const draw=()=>{
    const d=fD.value,z=fZ.value,q=fQ.value.trim(),sk=fS.value;
    let list=TX.filter(r=>(!d||r[0]===d)&&(!z||r[3]===z)&&(!q||(r[1]||"").includes(q)));
    const idx={date:2,area:4,unit:5,total:6}[sk];
    list.sort((a,b)=>{if(sk==="date")return (b[2]||"").localeCompare(a[2]||"");return (b[idx]??-1)-(a[idx]??-1);});
    s.list=list; s.page=Math.min(s.page,Math.floor((list.length-1)/50)||0);
    cnt.textContent=`符合 ${list.length.toLocaleString()} 筆`;
    drawPage();
  };
  const drawPage=()=>{
    const per=50,list=s.list,pg=s.page,slice=list.slice(pg*per,pg*per+per);
    document.getElementById("tablewrap").innerHTML=`<table><thead><tr>
      <th class="l">位置 / 行政區</th><th class="hidem">使用分區</th><th>面積<br><small>坪</small></th>
      <th>單價<br><small>萬/坪</small></th><th>總價<br><small>萬</small></th><th class="l">交易日</th>
      </tr></thead><tbody>${slice.map(lRow).join("")||empty(6)}</tbody></table>
      <div class="pager"><button id="pp" ${pg<=0?'disabled':''}>‹ 上一頁</button>
      <span>第 ${pg+1} / ${Math.max(1,Math.ceil(list.length/per))} 頁</span>
      <button id="pn" ${(pg+1)*per>=list.length?'disabled':''}>下一頁 ›</button></div>`;
    const pp=document.getElementById("pp"),pn=document.getElementById("pn");
    if(pp)pp.onclick=()=>{s.page--;drawPage();window.scrollTo(0,0);};
    if(pn)pn.onclick=()=>{s.page++;drawPage();window.scrollTo(0,0);};
  };
  ["fD","fZ","fQ","fS"].forEach(id=>document.getElementById(id).addEventListener("input",()=>{s.page=0;draw();}));
  draw();
}
function lRow(r){return `<tr>
  <td class="l"><span class="dist">${r[0]}</span>${r[1]||''}</td>
  <td class="hidem">${r[3]||''}</td><td>${r[4]!=null?r[4].toLocaleString():'<span class="muted">—</span>'}</td>
  <td class="price">${r[5]!=null?r[5].toFixed(1):'<span class="muted">—</span>'}</td>
  <td>${r[6]!=null?r[6].toLocaleString():'<span class="muted">—</span>'}</td>
  <td class="l"><span class="rng">${r[2]||''}</span></td></tr>`;}

/* ===== 共用 ===== */
function empty(c){return `<tr><td colspan="${c}" style="text-align:center;padding:30px;color:#999">查無符合條件的資料</td></tr>`;}
function insertDetail(tr,span,title,inner){
  const det=document.createElement("tr");det.className="detail";
  det.innerHTML=`<td colspan="${span}"><div class="dwrap"><h4>${title}</h4><table class="tx">${inner}</table></div></td>`;
  tr.after(det);
}
boot().catch(e=>{document.getElementById("sub").textContent="⚠ 資料載入失敗，請用本機伺服器開啟(見頁尾)。"+e;});
</script>
</body>
</html>
